<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kallies Liefer-Service</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #fdf6ec; --text: #3d2b1f; --accent: #e8703a; --warm: #f5e6cc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 20px; }
        nav { background: var(--text); padding: 15px; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 1000; }
        .nav-tab { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; }
        .nav-tab.active { background: var(--accent); font-weight: bold; }
        .page { display: none; padding: 20px; max-width: 500px; margin: 0 auto; }
        .page.active { display: block; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .item { background: var(--warm); border-radius: 15px; padding: 12px 5px; text-align: center; border: 2px solid transparent; cursor: pointer; }
        .item.selected { border-color: var(--accent); background: white; box-shadow: 0 0 10px rgba(232,112,58,0.2); }
        .qty-info { font-size: 0.65rem; display: block; color: #886b5e; font-weight: bold; margin-top: 4px; }
        .btn { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 1rem; background: white; }
        .admin-flex { display: flex; gap: 5px; }
    </style>
</head>
<body>

<nav>
    <strong>🍳 Kallies Service</strong>
    <div>
        <button class="nav-tab active" id="t-order" onclick="showPage('order')">Wunsch</button>
        <button class="nav-tab" id="t-admin" onclick="showPage('admin')">Küche</button>
    </div>
</nav>

<div id="page-order" class="page active">
    <div class="card">
        <h2>Was möchtest du?</h2>
        <button class="btn" style="background:#8b5e3c" onclick="startOrder('Brotzeit')">🍞 Brotzeit</button>
        <button class="btn" style="background:#5e8b3c" onclick="startOrder('Mittagessen')">🍲 Mittagessen</button>
        <button class="btn" style="background:#3c5e8b" onclick="startOrder('Abendessen')">🥗 Abendessen</button>
    </div>
</div>

<div id="page-select" class="page">
    <div class="card">
        <h2 id="select-title">Was soll drauf?</h2>
        <div id="item-grid" class="grid">Lade...</div>
        <textarea id="extra-wish" placeholder="Besondere Wünsche? (z.B. viel Butter)"></textarea>
        <button class="btn" onclick="sendFinalOrder()">Bestellung abschicken ✨</button>
        <button class="btn" style="background:#eee; color:#555" onclick="showPage('order')">Zurück</button>
    </div>
</div>

<div id="page-admin" class="page">
    <div class="card">
        <h3>Neuer Vorrat</h3>
        <input type="text" id="add-emoji" placeholder="Emoji (z.B. 🧀)">
        <input type="text" id="add-name" placeholder="Name (z.B. Käse)">
        <div class="admin-flex">
            <input type="number" id="add-qty-num" placeholder="Menge" style="width: 40%">
            <select id="add-qty-unit" style="width: 60%">
                <option value="Stk">Stück (Stk)</option>
                <option value="Scheiben">Scheiben</option>
                <option value="g">Gramm (g)</option>
                <option value="kg">Kilogramm (kg)</option>
                <option value="Pkg">Packung (Pkg)</option>
                <option value="ml">Milliliter (ml)</option>
            </select>
        </div>
        <button class="btn" onclick="saveToDb()">Ins Lager legen</button>
    </div>
    <div id="admin-list"></div>
</div>

<script>
    const S_URL = "https://tdlswqmltbzvjdavnuyz.supabase.co";
    const S_KEY = "sb_publishable_emlxBa5GwRegGymo7_M0uQ_i91HAeo3";
    const db = window.supabase.createClient(S_URL, S_KEY);

    let currentCat = "";
    let chosen = [];

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        if(document.getElementById('t-' + id)) document.getElementById('t-' + id).classList.add('active');
        if(id === 'admin') loadAdmin();
    }

    async function startOrder(cat) {
        currentCat = cat;
        chosen = [];
        document.getElementById('select-title').innerText = "Auswahl: " + cat;
        showPage('select');
        const { data } = await db.from('inventory').select('*').order('name');
        document.getElementById('item-grid').innerHTML = data.map(i => `
            <div class="item" id="i-${i.id}" onclick="toggle('${i.name}', ${i.id})">
                <div style="font-size:1.5rem">${i.emoji || '📦'}</div>
                <div style="font-size:0.75rem; font-weight:bold">${i.name}</div>
                <span class="qty-info">${i.qty || ''}</span>
            </div>
        `).join('') || "Lager ist leer.";
    }

    function toggle(name, id) {
        const el = document.getElementById('i-' + id);
        if(chosen.includes(name)) {
            chosen = chosen.filter(n => n !== name);
            el.classList.remove('selected');
        } else {
            chosen.push(name);
            el.classList.add('selected');
        }
    }

    async function sendFinalOrder() {
        if(chosen.length === 0 && currentCat === 'Brotzeit') return alert("Wähle bitte etwas aus!");
        const extra = document.getElementById('extra-wish').value;
        
        // Wir passen die Daten an DEINE Tabellenstruktur an (note statt text)
        const bestellText = `${currentCat}: ${chosen.join(', ')} ${extra ? ' | Extra: '+extra : ''}`;
        
        const { error } = await db.from('orders').insert([{ 
            note: bestellText, 
            status: 'pending' 
        }]);

        if(!error) {
            alert("Erfolg! Bestellung abgeschickt.");
            document.getElementById('extra-wish').value = "";
            showPage('order');
        } else { 
            console.error(error);
            alert("Fehler: " + error.message); 
        }
    }

    async function loadAdmin() {
        const { data } = await db.from('inventory').select('*').order('name');
        document.getElementById('admin-list').innerHTML = data.map(i => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:12px; margin-bottom:10px">
                <span>${i.emoji} <b>${i.name}</b> <br><small>${i.qty || '0'}</small></span>
                <button onclick="del(${i.id})" style="color:red; border:none; background:none; font-size:1.2rem">✕</button>
            </div>
        `).join('');
    }

    async function saveToDb() {
        const name = document.getElementById('add-name').value;
        const emoji = document.getElementById('add-emoji').value || '🍴';
        const num = document.getElementById('add-qty-num').value || '1';
        const unit = document.getElementById('add-qty-unit').value;
        const fullQty = num + " " + unit;

        if(!name) return alert("Name fehlt!");

        const { error } = await db.from('inventory').insert([{ name, emoji, qty: fullQty }]);
        if(error) alert("Fehler beim Speichern: " + error.message);
        
        document.getElementById('add-name').value = "";
        document.getElementById('add-qty-num').value = "";
        loadAdmin();
    }

    async function del(id) { 
        if(confirm("Löschen?")) {
            await db.from('inventory').delete().eq('id', id); 
            loadAdmin(); 
        }
    }
</script>
</body>
</html>

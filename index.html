<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kallies Küche</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #fdf6ec; --text: #3d2b1f; --accent: #e8703a; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        nav { background: var(--text); color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: bold; font-size: 1.2rem; }
        .nav-tabs { display: flex; gap: 8px; }
        .nav-tab { background: #555; border: none; color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
        .nav-tab.active { background: var(--accent); }
        .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
        .page.active { display: block; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #debug-log { background: #222; color: #0f0; padding: 10px; font-family: monospace; font-size: 11px; height: 80px; overflow-y: auto; position: fixed; bottom: 0; width: 100%; border-top: 2px solid #444; }
    </style>
</head>
<body>

<nav>
    <div class="logo">🍳 Kallies Küche</div>
    <div class="nav-tabs">
        <button id="btn-order" class="nav-tab active" onclick="showPage('order')">Bestellen</button>
        <button id="btn-admin" class="nav-tab" onclick="showPage('admin')">Küche</button>
    </div>
</nav>

<div id="page-order" class="page active">
    <div class="card">
        <h2>🧊 Kühlschrank</h2>
        <div id="user-grid">Lade Inventar...</div>
    </div>
</div>

<div id="page-admin" class="page">
    <div class="card">
        <h2>➕ Neuen Artikel hinzufügen</h2>
        <input type="text" id="in-name" placeholder="Name (z.B. Eier)" style="width:70%; padding:10px;">
        <button onclick="saveToDb()" style="padding:10px; background:green; color:white; border:none; border-radius:5px; cursor:pointer;">Speichern</button>
    </div>
    <div class="card">
        <h2>📦 Lagerbestand</h2>
        <div id="admin-list"></div>
    </div>
</div>

<div id="debug-log">Initialisiere...<br></div>

<script>
    // 1. DEINE DATEN (REINIGUNG: Variable heißt jetzt 'db' statt 'supabase')
    const S_URL = "https://tdlswqmltbzvjdavnuyz.supabase.co";
    const S_KEY = "sb_publishable_emlxBa5GwRegGymo7_M0uQ_i91HAeo3";

    const logger = document.getElementById('debug-log');
    function log(m) { logger.innerHTML += "> " + m + "<br>"; logger.scrollTop = logger.scrollHeight; }

    // TABS UMSCHALTEN (Funktion muss 'showPage' heißen, wie im HTML)
    function showPage(pageId) {
        log("Wechsle zu: " + pageId);
        // Seiten
        document.getElementById('page-order').classList.remove('active');
        document.getElementById('page-admin').classList.remove('active');
        document.getElementById('page-' + pageId).classList.add('active');
        // Buttons
        document.getElementById('btn-order').classList.remove('active');
        document.getElementById('btn-admin').classList.remove('active');
        document.getElementById('btn-' + pageId).classList.add('active');
        
        loadFromDb();
    }

    // DATENBANK VERBINDUNG
    let db;
    try {
        // Wir nutzen den globalen 'supabase' Namen der Library NUR zum Erstellen
        db = window.supabase.createClient(S_URL, S_KEY);
        log("Verbindung zur Datenbank steht.");
    } catch(e) {
        log("FEHLER: " + e.message);
    }

    async function loadFromDb() {
        log("Lade Daten...");
        try {
            const { data, error } = await db.from('inventory').select('*');
            if(error) throw error;
            
            log(data.length + " Artikel gefunden.");
            
            // Anzeige User
            document.getElementById('user-grid').innerHTML = data.map(i => `
                <div style="padding:10px; background:#f5e6cc; margin:5px; border-radius:8px; display:inline-block;">
                    <b>${i.name}</b>
                </div>
            `).join('') || "Kühlschrank leer.";

            // Anzeige Admin
            document.getElementById('admin-list').innerHTML = data.map(i => `
                <div style="border-bottom:1px solid #eee; padding:10px; display:flex; justify-content:space-between;">
                    <span>${i.name}</span>
                    <button onclick="deleteFromDb(${i.id})" style="color:red; border:none; background:none; cursor:pointer;">Löschen</button>
                </div>
            `).join('');

        } catch(e) {
            log("DB-Ladefehler: " + e.message);
        }
    }

    async function saveToDb() {
        const val = document.getElementById('in-name').value;
        if(!val) return;
        log("Speichere: " + val);
        const { error } = await db.from('inventory').insert([{ name: val }]);
        if(error) log("Speicherfehler: " + error.message);
        document.getElementById('in-name').value = "";
        loadFromDb();
    }

    async function deleteFromDb(id) {
        await db.from('inventory').delete().eq('id', id);
        loadFromDb();
    }

    // Start
    loadFromDb();
</script>
</body>
</html>
